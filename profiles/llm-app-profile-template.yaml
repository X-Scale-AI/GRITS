# GRITS LLM App Profile Template
# For chatbots, copilots, RAG apps, and prompt wrappers that do NOT act autonomously.
# Copy this file, rename it, fill in every field.
# To score this profile, use grits-agent-scanner: https://github.com/X-Scale-AI/grits-agent-scanner

# ── Identity ──
object_id:                          # unique ID (e.g., "support-copilot-01")
name:                               # human-readable name
owner:                              # accountable owner
deputy_owner:                       # backup owner
business_purpose:                   # what does this app do and why

# ── Classification ──
object_type: LLM App
profile_type: LLM App
autonomy_tier: 0                    # 0 for most LLM apps (user-driven, not autonomous)
impact_tier: 2                      # 1=experimental, 2=team/internal, 3=business-critical
data_sensitivity_class: internal    # public, internal, confidential, restricted

# ── Runtime ──
environment: production             # dev, test, staging, production
runtime: custom                     # openclaw, nemoclaw, langchain, custom, other
version:
runtime_status: active

# ── Tool Permissions ──
tool_permissions:
  - retrieval
  # Most LLM apps only need retrieval. Add only what is required.

# ── Security Posture (answer honestly) ──
# LLM apps are scored against applicable controls only. See framework/assessment/scoring-methodology.md.
checks:
  # Layer 1: Network
  network_exposure_reviewed: false          # NET-001: reachable services and paths documented?
  network_egress_restricted: false          # NET-002: outbound traffic locked to required endpoints only?
  management_port_protected: false          # NET-004: admin interface accessible only from your subnet/VPN?
  # Layer 2: Operator
  operator_identity_verified: false         # OPR-001: user authentication enforced?
  # Layer 3: Application
  tool_scope_deny_by_default: false         # APP-001: tools restricted to declared list?
  dangerous_capabilities_scoped: false      # APP-003: file_write, code_execution disabled or scoped?
  # Layer 4: OS and Secrets
  secrets_off_filesystem: false             # SEC-001: API keys not in readable files?
  secrets_injected_at_runtime: false        # SEC-002: keys injected via systemd/docker secrets?
  host_permissions_hardened: false          # SEC-003: OS-level access restricted?
  # Layer 5: Financial
  cost_guardrails_defined: false            # FIN-001: spending limits set?
  budget_accountability_assigned: false     # FIN-003: named owner responsible for API spend?
  # Governance cross-cutting
  owner_assigned: false                     # GOV-001: accountable owner exists?
  deputy_owner_assigned: false              # GOV-002: backup owner assigned?
  recertification_set: false                # GOV-003: review date scheduled (max 90 days)?
  monitoring_enabled: false                 # GOV-004: usage/error logging active?
  policy_violation_visibility: false        # GOV-005: policy violations can be detected and surfaced?

# ── Review ──
last_review_date:
recertification_due:

# ── Cost ──
budget_guardrails:
  daily_token_limit:
  monthly_budget_usd:
